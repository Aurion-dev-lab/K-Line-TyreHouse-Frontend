server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

spring:
  application:
    name: kline-backend-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kline_server?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ

# Security Configuration
security:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong1234567890}
    expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in milliseconds

# API Configuration
api:
  version: v1
  base-path: /api/${api.version}
  
# Sync Configuration
sync:
  api-key: ${SYNC_API_KEY:defaultSyncKey1234567890}
  batch-size: 100
  max-retries: 3
  retry-delay: 5000 # milliseconds

# Server Configuration
kline:
  server:
    name: K-Line Backend Server
    version: 1.0.0
    description: REST API server for K-Line Tyre House management system

# CORS Configuration
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:8080,http://localhost:3000,http://localhost:4200}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: Authorization,Content-Type,Accept,Origin,X-Requested-With,X-API-KEY
  max-age: 3600

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.gui.kline: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.hibernate.SQL: ${SHOW_SQL:false}
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,loggers
  endpoint:
    health:
      show-details: when_authorized

# File Upload Configuration
file:
  upload:
    location: ${UPLOAD_DIR:./uploads}
    max-file-size: 10MB
    max-request-size: 10MB

# Application Specific Properties
app:
  device:
    registration:
      enabled: true
      default-quota: 1000
  
  # Rate Limiting
  rate-limiting:
    enabled: true
    requests-per-minute: 60
    requests-per-hour: 1000

# Development Profile
---
spring:
  config:
    activate:
      on-profile: dev
  
  # H2 Database for development/testing
  datasource:
    url: jdbc:h2:mem:kline_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

logging:
  level:
    root: DEBUG
    com.gui.kline: DEBUG

# Production Profile
---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.gui.kline: INFO

# Test Profile
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
