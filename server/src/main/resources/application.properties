server.port=8080

spring.datasource.url=${KLINE_DB_URL:jdbc:mysql://localhost:3306/kline_sync?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${KLINE_DB_USER:root}
spring.datasource.password=${KLINE_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

sync.api-key=${KLINE_SYNC_API_KEY:change-me}
